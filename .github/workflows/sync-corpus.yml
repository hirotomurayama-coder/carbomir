# carboncredits.jp 用語集 (glossary) の日次自動同期 (PROVENANCE 媒体連携・自動化A)
#
# 毎日 sync:glossary を実行し、差分があれば glossary-map.json を commit→push。
# Vercel が Git 連携で自動再デプロイ (deploy hook 不要・確認済み)。
#
# glossary は wp-sitemap (静的) 由来なので Cloudflare bot 保護を無料で通過する。
# 一方 media (記事 corpus = WP REST /wp-json/) は Cloudflare Bot Fight Mode が
# データセンター IP を 403 で弾き、無料プランでは WAF ルールで回避不可。よって
# media (sync:media) は CI に含めず手動運用とする (非ブロック環境から実行→commit→deploy)。
#
# GitHub Secrets:
#   - GLOSSARY_SYNC_UA … 現状休眠 (sitemap は default UA で通る)。将来 media を
#                        静的 JSON + トークン許可で自動化する際に再利用可。

name: Sync carboncredits.jp glossary

on:
  schedule:
    - cron: "0 21 * * *" # 06:00 JST 毎日
  workflow_dispatch: {} # 手動トリガ (動作確認用)

concurrency:
  group: sync-corpus
  cancel-in-progress: false

permissions:
  contents: write # commit + push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Sync glossary corpus (静的 sitemap = 無料で通過)
        env:
          GLOSSARY_SYNC_UA: ${{ secrets.GLOSSARY_SYNC_UA }}
        run: npm run sync:glossary

      - name: Commit & deploy if changed
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          FILES="data/content/glossary-map.json"
          if git diff --quiet -- $FILES; then
            echo "glossary に変更なし。skip。"
          else
            git add $FILES
            git commit -m "chore: glossary 自動同期 ($(date -u +%Y-%m-%d))"
            git push
            echo "corpus を更新・push。"
            if [ -n "${VERCEL_DEPLOY_HOOK_URL:-}" ]; then
              curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK_URL" >/dev/null && echo "Vercel deploy hook を実行。"
            else
              echo "deploy hook secret なし。Vercel Git 連携での自動デプロイに委譲。"
            fi
          fi
